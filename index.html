<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Neon Void Survivor</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
            user-select: none;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .bar-box {
            width: 300px;
            height: 15px;
            border: 2px solid;
            margin-bottom: 8px;
            background: rgba(0, 255, 255, 0.1);
            position: relative;
            box-shadow: 0 0 10px;
        }

        .bar-lbl {
            position: absolute;
            left: 5px;
            top: -2px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        .fill {
            height: 100%;
            transition: width 0.2s;
        }

        #hp-fill {
            background: #f0f;
            box-shadow: 0 0 10px #f0f;
        }

        #xp-fill {
            background: #0ff;
            box-shadow: 0 0 10px #0ff;
        }

        #wave-fill {
            background: #ff0;
            box-shadow: 0 0 10px #ff0;
        }

        #stats {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            transition: color 0.3s;
        }

        #ammo-ui {
            font-size: 24px;
            font-weight: bold;
            color: #ff0;
            text-shadow: 0 0 10px #ff0;
            margin-top: 15px;
        }

        #reload-box {
            display: none;
            height: 10px;
            width: 150px;
            border: 2px solid #ff0;
            margin-top: 5px;
            box-shadow: 0 0 10px #ff0;
        }

        #reload-fill {
            width: 0%;
            height: 100%;
            background: #ff0;
            box-shadow: 0 0 10px #ff0;
        }

        #wep-ui {
            margin-top: 20px;
            font-size: 18px;
            color: #aaa;
            text-shadow: none;
            line-height: 1.5;
        }

        .act-wep {
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #0ff;
            font-weight: bold;
            font-size: 20px;
        }

        .chg {
            font-size: 14px;
        }

        #msg {
            display: none;
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: #fff;
            text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
            text-align: center;
            font-weight: bold;
            z-index: 15;
        }

        #over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: #f00;
            text-shadow: 0 0 20px #f00, 0 0 40px #f00;
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
            font-weight: bold;
            z-index: 20;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid #f00;
            border-radius: 10px;
        }

        #boss {
            display: none;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            text-align: center;
            z-index: 15;
        }

        #b-name {
            color: #f0f;
            text-shadow: 0 0 15px #f0f;
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        #b-box {
            width: 100%;
            height: 25px;
            border: 3px solid #f0f;
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 15px #f0f;
        }

        #b-fill {
            width: 100%;
            height: 100%;
            background: #f0f;
            transition: width 0.1s;
            box-shadow: 0 0 15px #f0f;
        }

        #notif {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>

        let st = {

        function exp(pos, c, cnt = 10) { for (let i = 0; i < cnt; i++) { let m = new THREE.MeshStandardMaterial({ color: c, emissive: c, emissiveIntensity: 1.5 }); let pt = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.15), m); pt.position.copy(pos); pt.userData = { v: new THREE.Vector3(Math.random() - 0.5, Math.random(), Math.random() - 0.5).multiplyScalar(0.4), l: 1.0 }; scn.add(pt); st.part.push(pt); } }
        function lvlUp() { if (st.xp >= st.lvl * 100) { st.xp -= st.lvl * 100; st.lvl++; st.w.forEach((w, i) => { if (i !== 3) { w.m += 2; w.r = Math.max(300, w.r * 0.9); w.a = w.m; } }); st.hp = Math.min(100, st.hp + 50); st.g++; exp(p.position, 0x00ff00, 30); notif("SYSTEM UPGRADED<br>+MAG | -RELOAD", "#0f0"); updHUD(); } }

        function spE() {

            st.eBul.forEach((b, i) => { b.position.add(b.userData.v); if (b.position.distanceTo(p.position) < 1.2) { if (n < st.buff.sh) { grid.material.color.setHex(0xffffff); setTimeout(() => grid.material.color.setHex(0x00ffff), 50); } else { st.hp -= b.userData.dmg; grid.material.color.setHex(0xff0000); setTimeout(() => grid.material.color.setHex(0x00ffff), 100); } exp(p.position, 0xff0000, 5); scn.remove(b); st.eBul.splice(i, 1); updHUD(); if (st.hp <= 0 && !st.over) { st.over = true; $('over').style.display = "block"; $('boss').style.display = 'none'; scn.remove(p); exp(p.position, 0x00ffcc, 50); } } else if (b.position.distanceTo(p.position) > 150) { scn.remove(b); st.eBul.splice(i, 1); } });
            st.pu.forEach((pu, i) => { pu.rotation.y += 0.03; pu.position.y = 0.5 + Math.sin(n * 0.005) * 0.1; let d = p.position.distanceTo(pu.position); if (d < 6.0) pu.position.lerp(p.position, 0.1); if (d < 1.5) { let t = pu.userData.t; if (t === 'hl') { st.hp = Math.min(100, st.hp + 20); notif("HP RECOVERED", "#0f0"); } else if (t === 'sh') { st.buff.sh = n + 10000; notif("SHIELD ACTIVE", "#0ff"); } else if (t === 'am') { st.buff.inf = n + 10000; if (st.rl) { st.rl = false; $('reload-box').style.display = "none"; } notif("∞ AMMO", "#ff0"); } scn.remove(pu); st.pu.splice(i, 1); updHUD(); } });
            st.e.forEach((e, ei) => {
                let dr = new THREE.Vector3().subVectors(p.position, e.position).normalize(); let bs = 0.03 + (st.wv * 0.002); if (st.bAct) bs *= e.userData.sM; e.position.add(dr.multiplyScalar(bs * e.userData.sM));
                if (e.userData.t === 'b') { e.rotation.x += 0.02; e.rotation.y += 0.03; } else if (e.userData.t === 'mb') { e.rotation.x += 0.01; e.rotation.y += 0.02; e.userData.wr.rotation.x -= 0.02; e.userData.wr.rotation.y -= 0.03; if (n - e.userData.lS > e.userData.fR) { let bb = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 2), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 3 })); bb.position.copy(e.position); bb.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), dr); bb.userData = { v: dr.multiplyScalar(0.5), dmg: 10 + (st.wv * 2) }; scn.add(bb); st.eBul.push(bb); e.userData.lS = n; } } else e.rotation.y += 0.05;
                if (p.position.distanceTo(e.position) < (0.8 + e.userData.s / 2)) { if (n < st.buff.sh) { exp(e.position, 0x00ffff, 3); grid.material.color.setHex(0xffffff); setTimeout(() => grid.material.color.setHex(0x00ffff), 50); } else { st.hp -= (e.userData.t === "br" ? 30 : 15); grid.material.color.setHex(0xff0000); setTimeout(() => grid.material.color.setHex(0x00ffff), 100); } exp(e.position, 0xffffff); if (e.userData.wr) scn.remove(e.userData.wr); scn.remove(e); st.e.splice(ei, 1); updHUD(); if (st.hp <= 0 && !st.over) { st.over = true; $('over').style.display = "block"; $('boss').style.display = 'none'; scn.remove(p); exp(p.position, 0x00ffcc, 50); } }
                st.bul.forEach((b, bi) => {
                    if (b && e && b.position.distanceTo(e.position) < (0.2 + e.userData.s / 2)) {
                        e.userData.hp -= b.userData.dmg; e.position.add(b.userData.v.clone().normalize().multiplyScalar(0.5)); exp(e.position, b.userData.c, 3); scn.remove(b); st.bul.splice(bi, 1);
                        if (e.userData.t === 'b') { updHUD(); grid.material.color.setHex(0xff00ff); setTimeout(() => grid.material.color.setHex(0x00ffff), 80); }
                        if (e.userData.hp <= 0) { if (e.userData.t === 'b') handleBossDeath(e, ei); else { exp(e.position, e.userData.c, 15); spPU(e.position); if (e.userData.wr) scn.remove(e.userData.wr); scn.remove(e); st.e.splice(ei, 1); st.k++; st.xp += (e.userData.t === "br" ? 150 : e.userData.t === "sk" ? 50 : e.userData.t === "mb" ? 400 : 30); lvlUp(); updHUD(); } }
                        else if (e.userData.t !== 'b' && e.userData.t !== 'mb') { let dp = 1 - (e.userData.hp / e.userData.mHp); e.material.color.setHex(e.userData.oC).lerp(new THREE.Color(0xffffff), dp); e.material.emissive.setHex(e.userData.oC).lerp(new THREE.Color(0xffffff), dp); }
                    }
                });
            });
            if (!st.wBrk && !st.bAct) { if (st.wv % 2 === 0 && st.wv !== 10 && !st.mbSp) { spMB(); st.mbSp = true; } if (st.wSp < st.wQ) { if (Math.random() < Math.min(0.02 + (st.wv * 0.003), 0.15)) { spE(); st.wSp++; updHUD(); } } else if (st.e.length === 0) brk(); }
            cam.position.lerp(new THREE.Vector3(p.position.x, 15, p.position.z + 15), 0.1); cam.lookAt(p.position);
        }
        function anim() { requestAnimationFrame(animate); upd(); comp.render(); } updHUD(); anim();
    </script>
